{% extends "base.html" %}
{% block content %}
<h2>Delete Record</h2>
<p>Are you sure you want to delete this item?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
    <a href="javascript:history.back()" class="btn">Cancel</a>
</form>
{% endblock %}
