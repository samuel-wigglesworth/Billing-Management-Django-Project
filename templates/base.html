<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fb; }
        nav { background: #1f2937; color: #fff; padding: 12px 20px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        nav a { color: #fff; text-decoration: none; }
        .container { max-width: 1100px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        .btn { background: #2563eb; color: #fff; padding: 8px 12px; text-decoration: none; border: none; border-radius: 4px; cursor: pointer; }
        .btn-danger { background: #dc2626; }
        .actions { display: flex; gap: 8px; }
        form.inline { display: inline; }
        .empty { color: #6b7280; margin-top: 14px; font-weight: 600; }
        .filter { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
        <nav>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'product_list' %}">Products</a>
            <a href="{% url 'billing_list' %}">Billing</a>
            <a href="{% url 'salesdata_list' %}">Sales Data</a>
            <a href="{% url 'salesinvoice_list' %}">Sales Invoice</a>
            {% block nav_filter %}{% endblock %}
            <form method="post" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button class="btn" type="submit">Logout</button>
            </form>
        </nav>
    {% endif %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
